<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niscai — Freight CO2 Calculator</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Load order matters: each file depends on globals defined by the ones before it -->
  <script type="text/babel" src="js/storage.js"></script>
  <script type="text/babel" src="js/Autocomplete.js"></script>
  <script type="text/babel" src="js/HomePage.js"></script>
  <script type="text/babel" src="js/JourneyBuilder.js"></script>
  <script type="text/babel" src="js/Root.js"></script>
</body>
</html>
